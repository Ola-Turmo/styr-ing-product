name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          SURREALDB_URL: ${{ secrets.SURREALDB_URL || 'https://surreal-shadow-06ek4uedppsrt6cr5g20pkee5s.aws-euw1.surreal.cloud' }}
          SURREALDB_NS: ${{ secrets.SURREALDB_NS || 'main' }}
          SURREALDB_DB: ${{ secrets.SURREALDB_DB || 'main' }}
          SURREALDB_USER: ${{ secrets.SURREALDB_USER || 'codex_ingest' }}
          SURREALDB_PASS: ${{ secrets.SURREALDB_PASS || '' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: styr-ing-product
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
